name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  Android:
    name: Android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Setup Env
        uses: ./.github/actions/setup

      - name: Build Packages
        env:
          DISABLE_SVG: 1
        shell: bash
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
          mv app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/my-music-temp.apk || true

      - name: Get package version
        run: echo "PACKAGE_VERSION=$(node -p 'require("./package.json").version')" >> $GITHUB_ENV

      - name: List APK files
        run: ls -lh android/app/build/outputs/apk/release/

      - name: Rename APK files
        run: |
          cd android/app/build/outputs/apk/release/
          for apk in *.apk; do
            if [ "$apk" != "my-music-v${PACKAGE_VERSION}-universal.apk" ]; then
              newname=$(echo "$apk" | sed "s/lx-netease-music-mobile/my-music/g")
              mv "$apk" "$newname" 2>/dev/null || true
            fi
          done
          ls -lh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-music-apk
          path: android/app/build/outputs/apk/release/my-music*.apk

  Release:
    name: Release
    needs: [Android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: my-music-apk
          path: ./artifacts

      - name: Get package version
        run: echo "PACKAGE_VERSION=$(node -p 'require("./package.json").version')" >> $GITHUB_ENV

      - name: List files
        run: ls -lh artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.PACKAGE_VERSION }}
          name: 魔音 v${{ env.PACKAGE_VERSION }}
          body: |
            魔音 App 发布版本 v${{ env.PACKAGE_VERSION }}
            
            基于 lx-netease-music-mobile，包含下载、网易登录等所有新功能。
            
            ## 下载说明
            - universal.apk: 通用版（推荐）
            - arm64-v8a: 适用于64位 ARM 设备
            - armeabi-v7a: 适用于32位 ARM 设备
            - x86_64: 适用于64位 x86 设备
            - x86: 适用于32位 x86 设备
          draft: false
          prerelease: false
          files: |
            artifacts/my-music*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
